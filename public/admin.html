<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS Admin Control - Devnagari & 4 Options</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 15px; background: #f4f6f9; color: #333; }
        h1 { color: #004085; font-size: 24px; text-align: center; }
        .section { background: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { font-size: 18px; border-bottom: 2px solid #004085; padding-bottom: 5px; color: #004085; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f1f1f1; }
        button { padding: 6px 10px; cursor: pointer; border-radius: 4px; border: none; font-size: 12px; font-weight: bold; margin: 2px; }
        .btn-app { background: #28a745; color: white; }
        .btn-del { background: #dc3545; color: white; }
        .form-group { margin: 10px 0; padding: 10px; background: #fafafa; border-radius: 5px; border: 1px solid #e1e4e8; }
        input, select, textarea { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
        .ai-box { background: #e8f0fe; padding: 15px; border-radius: 6px; border: 2px dashed #1a73e8; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>CGTS Admin Control Panel</h1>

    <!-- Student Approvals -->
    <div class="section">
        <h2>Student Approvals</h2>
        <div style="overflow-x:auto;">
            <table id="studentTable">
                <thead>
                    <tr><th>Naam</th><th>Mobile</th><th>Password</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Content Management -->
    <div class="section">
        <h2>Create Test Content</h2>
        <div class="form-group">
            <h3>1. Course Banayein</h3>
            <input type="text" id="courseName" placeholder="Course Name">
            <button class="btn-app" onclick="manageCourse('create')">Create Course</button>
        </div>
        <div class="form-group">
            <h3>2. Subject Banayein</h3>
            <select id="courseSelect" onchange="loadAdminContent()"></select>
            <input type="text" id="subjectName" placeholder="Subject Name">
            <button class="btn-app" onclick="manageSubject('create')">Add Subject</button>
        </div>
        <div class="form-group">
            <h3>3. Test Name Add Karein</h3>
            <select id="subjectSelect"></select>
            <input type="text" id="testName" placeholder="Test Name (e.g., Mock Test 1)">
            <button class="btn-app" onclick="manageTest('create')">Add Test</button>
        </div>
    </div>

    <!-- Live Content Hierarchy & AI Form -->
    <div class="section">
        <h2>Live Content Tree</h2>
        
        <!-- AI Bulk Text Paste Box -->
        <div id="aiFormContainer" class="ai-box" style="display: none;">
            <h3 style="margin-top: 0; color: #1a73e8;">🤖 AI (Hindi Devnagari) Bulk Questions Uploader (4 Options + Vyakhya)</h3>
            <input type="hidden" id="targetCourseId">
            <input type="hidden" id="targetSubjectId">
            <input type="hidden" id="targetTestId">
            <p id="targetTestName" style="font-weight: bold; color: #333;"></p>

            <textarea id="aiBulkText" rows="12" placeholder="Yahan AI se copy kiya hua Hindi text paste karein jisme Sawal, A, B, C, D, Answer aur Vyakhya ho..."></textarea>
            
            <button class="btn-app" style="background: #1a73e8;" onclick="processAISubmission()">⚡ Auto Upload Hindi Questions</button>
            <button class="btn-hide" style="background:#6c757d; color:white;" onclick="closeAIForm()">Cancel</button>
        </div>

        <div id="contentTree" style="margin-top: 15px;"></div>
    </div>

    <script>
        async function loadAll() { loadStudents(); loadAdminContent(); }

        async function loadStudents() {
            const res = await fetch('/api/admin/students');
            const students = await res.json();
            const tbody = document.querySelector('#studentTable tbody');
            tbody.innerHTML = '';
            students.forEach(s => {
                tbody.innerHTML += `<tr><td>${s.name}</td><td>${s.mobile}</td><td>${s.password}</td><td><mark>${s.status.toUpperCase()}</mark></td><td><button class="btn-app" onclick="updateStatus(${s.id}, 'approved')">Approve</button> <button class="btn-del" onclick="updateStatus(${s.id}, 'delete')">Delete</button></td></tr>`;
            });
        }

        async function updateStatus(id, status) {
            await fetch('/api/admin/student-status', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, status }) });
            loadAll();
        }

        async function loadAdminContent() {
            const res = await fetch('/api/admin/content');
            const courses = await res.json();
            const courseSelect = document.getElementById('courseSelect');
            const subjectSelect = document.getElementById('subjectSelect');
            const contentTree = document.getElementById('contentTree');
            const selectedCVal = courseSelect.value;
            courseSelect.innerHTML = ''; subjectSelect.innerHTML = ''; contentTree.innerHTML = '';

            courses.forEach(c => {
                const opt = document.createElement('option'); opt.value = c.id; opt.innerText = c.name;
                if(c.id == selectedCVal) opt.selected = true;
                courseSelect.appendChild(opt);
                
                let subjectHTML = '';
                c.subjects.forEach(s => {
                    if(courseSelect.value == c.id) subjectSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                    let testHTML = '';
                    s.tests.forEach(t => {
                        testHTML += `<div style="margin-left: 20px; background: #fff3cd; padding: 8px; margin-top:5px; border-radius:4px;">📝 Test: <b>${t.name}</b> | Qs: ${t.questions.length} <br><button class="btn-del" onclick="deleteTest(${c.id}, ${s.id}, ${t.id})">Delete</button> <button class="btn-app" style="background:#1a73e8; color:white;" onclick="openAIForm(${c.id}, ${s.id}, ${t.id}, '${t.name}')">🤖 AI Bulk Upload (Hindi)</button></div>`;
                    });
                    subjectHTML += `<div style="margin-left: 15px; background: #e2e3e5; padding: 8px; margin-top:5px; border-radius:4px;">📚 Subject: <b>${s.name}</b> <br><button class="btn-del" onclick="deleteSubject(${c.id}, ${s.id})">Delete</button>${testHTML}</div>`;
                });
                contentTree.innerHTML += `<div style="background: #d1ecf1; padding: 10px; margin-top: 10px; border-radius: 4px;">🏢 Course: <strong>${c.name}</strong> <br><button class="btn-del" onclick="deleteCourse(${c.id})">Delete</button>${subjectHTML}</div>`;
            });
        }

        async function manageCourse(action, courseId) { const name = document.getElementById('courseName').value; await fetch('/api/admin/course', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, courseId, name }) }); document.getElementById('courseName').value = ''; loadAdminContent(); }
        async function deleteCourse(id) { await manageCourse('delete', id); }
        async function manageSubject(action, sId) { const courseId = parseInt(document.getElementById('courseSelect').value); const name = document.getElementById('subjectName').value; await fetch('/api/admin/subject', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, courseId, subjectId: sId, name }) }); document.getElementById('subjectName').value = ''; loadAdminContent(); }
        async function deleteSubject(cId, sId) { await fetch('/api/admin/subject', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete', courseId: cId, subjectId: sId }) }); loadAdminContent(); }
        async function manageTest(action, tId) { const courseId = parseInt(document.getElementById('courseSelect').value); const subjectId = parseInt(document.getElementById('subjectSelect').value); const name = document.getElementById('testName').value; await fetch('/api/admin/test', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, courseId, subjectId, testId: tId, name }) }); document.getElementById('testName').value = ''; loadAdminContent(); }
        async function deleteTest(cId, sId, tId) { await fetch('/api/admin/test', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'delete', courseId: cId, subjectId: sId, testId: tId }) }); loadAdminContent(); }

        function openAIForm(cId, sId, tId, testName) {
            document.getElementById('targetCourseId').value = cId;
            document.getElementById('targetSubjectId').value = sId;
            document.getElementById('targetTestId').value = tId;
            document.getElementById('targetTestName').innerText = "Target Test: " + testName;
            document.getElementById('aiFormContainer').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeAIForm() { document.getElementById('aiFormContainer').style.display = 'none'; document.getElementById('aiBulkText').value = ''; }

        async function processAISubmission() {
            const cId = parseInt(document.getElementById('targetCourseId').value);
            const sId = parseInt(document.getElementById('targetSubjectId').value);
            const tId = parseInt(document.getElementById('targetTestId').value);
            const rawText = document.getElementById('aiBulkText').value;

            if(!rawText.trim()) return alert("Pehle AI ka text paste karein!");

            const lines = rawText.split('\n');
            let parsedQuestions = [];
            let currentQ = null;

            lines.forEach(line => {
                let cleanLine = line.trim();
                if (!cleanLine) return;
                
                if (cleanLine.toLowerCase().startsWith('sawal') || cleanLine.toLowerCase().startsWith('q') || cleanLine.match(/^\d+\./) || cleanLine.startsWith('प्रश्न')) {
                    if (currentQ && currentQ.qText && currentQ.options.length === 4 && currentQ.ans) {
                        parsedQuestions.push(currentQ);
                    }
                    let txt = cleanLine.replace(/^sawal\s*\d*:/i, '').replace(/^प्रश्न\s*\d*:/, '').replace(/^\d+\.\s*/, '').trim();
                    currentQ = { qText: txt, options: [], ans: '', vyakhya: 'Koi vyakhya nahi hai.' };
                } 
                else if (cleanLine.toUpperCase().startsWith('A:') || cleanLine.toUpperCase().startsWith('A)')) {
                    if(currentQ) currentQ.options[0] = cleanLine.substring(2).trim();
                } 
                else if (cleanLine.toUpperCase().startsWith('B:') || cleanLine.toUpperCase().startsWith('B)')) {
                    if(currentQ) currentQ.options[1] = cleanLine.substring(2).trim();
                } 
                else if (cleanLine.toUpperCase().startsWith('C:') || cleanLine.toUpperCase().startsWith('C)')) {
                    if(currentQ) currentQ.options[2] = cleanLine.substring(2).trim();
                } 
                else if (cleanLine.toUpperCase().startsWith('D:') || cleanLine.toUpperCase().startsWith('D)')) {
                    if(currentQ) currentQ.options[3] = cleanLine.substring(2).trim();
                } 
                else if (cleanLine.toLowerCase().startsWith('answer:') || cleanLine.toLowerCase().startsWith('ans:')) {
                    if(currentQ) {
                        let ansChar = 'A';
                        if(cleanLine.toUpperCase().includes('B')) ansChar = 'B';
                        if(cleanLine.toUpperCase().includes('C')) ansChar = 'C';
                        if(cleanLine.toUpperCase().includes('D')) ansChar = 'D';
                        currentQ.ans = ansChar;
                    }
                }
                else if (cleanLine.toLowerCase().startsWith('vyakhya:') || cleanLine.startsWith('व्याख्या:')) {
                    if(currentQ) currentQ.vyakhya = cleanLine.replace(/^vyakhya:/i, '').replace(/^व्याख्या:/, '').trim();
                }
            });

            if (currentQ && currentQ.qText && currentQ.options.length === 4 && currentQ.ans) {
                parsedQuestions.push(currentQ);
            }

            if(parsedQuestions.length === 0) {
                return alert("Sawal sahi format me nahi mile! Kripya check karein ki har sawal me 4 options (A, B, C, D) aur Answer aur Vyakhya ho.");
            }

            const res = await fetch('/api/content');
            const data = await res.json();
            const course = data.find(c => c.id === cId);
            const subj = course.subjects.find(s => s.id === sId);
            const test = subj.tests.find(t => t.id === tId);
            
            test.questions = test.questions.concat(parsedQuestions);

            await fetch('/api/admin/test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'update-questions', courseId: cId, subjectId: sId, testId: tId, questions: test.questions })
            });

            alert(`🎉 ${parsedQuestions.length} Hindi Questions Vyakhya ke sath automatic upload ho gaye hain.`);
            closeAIForm();
            loadAdminContent();
        }

        window.onload = loadAll;
    </script>
</body>
</html>
