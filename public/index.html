<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Test Series Portal</title>
    
    <!-- Supabase JavaScript SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #0070f3; border-bottom: 2px solid #0070f3; padding-bottom: 5px; margin-top: 0; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #0070f3; color: white; padding: 12px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .question-card { background: #eef2f7; padding: 15px; margin: 15px 0; border-radius: 6px; border-left: 5px solid #0070f3; }
        .vyakhya-box { background: #fff3cd; color: #856404; padding: 10px; margin-top: 10px; border-radius: 4px; border-left: 3px solid #ffc107; font-size: 14px; display: none; }
        .show-vyakhya-btn { background-color: #28a745; margin-top: 10px; padding: 5px 10px; font-size: 12px; width: auto; }
        .show-vyakhya-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

    <!-- 1. STUDENT REGISTRATION FORM -->
    <div class="container" id="reg-container">
        <h2>Student Registration</h2>
        <form id="regForm">
            <input type="text" id="studentName" placeholder="Apna Naam Likhein" required>
            <input type="tel" id="studentMobile" placeholder="Mobile Number (10 Digits)" pattern="[0-9]{10}" required>
            <input type="password" id="studentPassword" placeholder="Password Banayein" required>
            <button type="submit">Register Karein</button>
        </form>
    </div>

    <!-- 2. ADMIN PANEL: ADD QUESTIONS -->
    <div class="container">
        <h2>Add New Question (Admin Panel)</h2>
        <form id="quizForm">
            <textarea id="qText" rows="3" placeholder="Sawal (Question) Likhein" required></textarea>
            <input type="text" id="optA" placeholder="Option A" required>
            <input type="text" id="optB" placeholder="Option B" required>
            <input type="text" id="optC" placeholder="Option C" required>
            <input type="text" id="optD" placeholder="Option D" required>
            
            <select id="correctOpt" required>
                <option value="">Correct Answer Select Karein</option>
                <option value="A">Option A</option>
                <option value="B">Option B</option>
                <option value="C">Option C</option>
                <option value="D">Option D</option>
            </select>
            
            <textarea id="vyakhyaText" rows="2" placeholder="Vyakhya (Explanation) Likhein (Optional)"></textarea>
            <button type="submit">Save Question</button>
        </form>
    </div>

    <!-- 3. LIVE QUIZ DISPLAY -->
    <div class="container">
        <h2>Live Questions</h2>
        <div id="questions-list">Questions load ho rahe hain...</div>
    </div>

    <script>
        // Supabase Credentials
        const SUPABASE_URL = "https://tyoddpmfzlmujkpdhpxt.supabase.co";
        const SUPABASE_KEY = "sb_publishable_AwPqYNdIpPyUOoZngM4nMg_bw0_NgJx";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 1. STUDENT REGISTRATION ---
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('studentName').value;
            const mobile = document.getElementById('studentMobile').value;
            const password = document.getElementById('studentPassword').value;

            const { data, error } = await _supabase
                .from('students')
                .insert([{ name, mobile, password }]);

            if (error) {
                alert("Registration Failed: " + error.message);
            } else {
                alert("Student Registered Successfully!");
                document.getElementById('regForm').reset();
            }
        });

        // --- 2. SAVE QUESTION (ADMIN) ---
        document.getElementById('quizForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const qtext = document.getElementById('qText').value;
            const opta = document.getElementById('optA').value;
            const optb = document.getElementById('optB').value;
            const optc = document.getElementById('optC').value;
            const optd = document.getElementById('optD').value;
            const correct = document.getElementById('correctOpt').value;
            const vyakhya = document.getElementById('vyakhyaText').value;

            const { data, error } = await _supabase
                .from('questions')
                .insert([{ qtext, opta, optb, optc, optd, correct, vyakhya }]);

            if (error) {
                alert("Failed to save question: " + error.message);
            } else {
                alert("Question Saved Successfully!");
                document.getElementById('quizForm').reset();
                loadQuestions(); // List refresh karne ke liye
            }
        });

        // --- 3. LOAD QUESTIONS ---
        async function loadQuestions() {
            const container = document.getElementById('questions-list');
            const { data, error } = await _supabase
                .from('questions')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                container.innerHTML = "Error loading questions: " + error.message;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = "Koi question nahi mila.";
                return;
            }

            container.innerHTML = "";
            data.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = "question-card";
                card.innerHTML = `
                    <strong>Q${index + 1}: ${q.qtext}</strong><br>
                    <input type="radio" name="q_${q.id}" value="A"> A) ${q.opta}<br>
                    <input type="radio" name="q_${q.id}" value="B"> B) ${q.optb}<br>
                    <input type="radio" name="q_${q.id}" value="C"> C) ${q.optc}<br>
                    <input type="radio" name="q_${q.id}" value="D"> D) ${q.optd}<br>
                    <button class="show-vyakhya-btn" onclick="toggleVyakhya(${q.id})">Answer & Vyakhya Dekhein</button>
                    <div id="vyakhya_${q.id}" class="vyakhya-box">
                        <strong>Correct Answer: ${q.correct}</strong><br>
                        ${q.vyakhya ? '<strong>Vyakhya:</strong> ' + q.vyakhya : 'Vyakhya nahi hai.'}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleVyakhya(id) {
            const box = document.getElementById(`vyakhya_${id}`);
            if (box.style.display === "none" || box.style.display === "") {
                box.style.display = "block";
            } else {
                box.style.display = "none";
            }
        }

        // Page load hote hi questions load karein
        window.onload = loadQuestions;
    </script>
</body>
</html>
