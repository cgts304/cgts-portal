<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGTS Student Dashboard</title>
    <style>
        :root { --bg: #f8fafc; --text: #1e293b; --box-bg: #ffffff; --header-bg: #0f172a; --sh: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .dark-theme { --bg: #0f172a; --text: #f1f5f9; --box-bg: #1e293b; --header-bg: #020617; }
        body { font-family: system-ui, sans-serif; margin: 20px; background: var(--bg); color: var(--text); transition: 0.3s; }
        .header { background: var(--header-bg); color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .marquee-container { background: #f59e0b; color: #1e293b; padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 15px; }
        #mainTitle h3 { font-size: 26px; border-left: 6px solid #3b82f6; padding-left: 12px; margin-top: 30px; font-weight: 800; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 25px; margin-top: 25px; }
        .card { background: var(--box-bg); padding: 40px 25px; border-radius: 20px; box-shadow: var(--sh); cursor: pointer; text-align: center; font-size: 22px; font-weight: 800; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-height: 140px; border: 2px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card:hover { transform: translateY(-10px) scale(1.05); }
        .card:active { transform: scale(0.97); }
        .course-card { border: 3px solid #10b981; color: #10b981; background: linear-gradient(135deg, rgba(16,185,129,0.05), var(--box-bg)); }
        .subject-card { border: 3px solid #f59e0b; color: #d97706; background: linear-gradient(135deg, rgba(245,158,11,0.05), var(--box-bg)); }
        .test-card { border: 3px solid #3b82f6; color: #3b82f6; background: linear-gradient(135deg, rgba(59,130,246,0.05), var(--box-bg)); }
        .test-card-subtext { font-size: 14px; font-weight: 600; color: #64748b; margin-top: 12px; background: rgba(0,0,0,0.05); padding: 4px 12px; border-radius: 30px; }
        .hidden { display: none; }
        .box { background: var(--box-bg); padding: 25px; border-radius: 12px; margin-top: 30px; box-shadow: var(--sh); }
        .q-block { margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.01); border-radius:8px; border:1px solid #e2e8f0; }
        .timer-banner { background: #ef4444; color: white; padding: 12px; font-weight: bold; text-align: center; border-radius: 6px; position: sticky; top: 0; z-index: 100; font-size:20px; }
        .vyakhya-box { background: #fef3c7; color:#1e293b; padding: 10px; border-radius: 6px; margin-top: 8px; border-left: 4px solid #f59e0b; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: left; }
        th { background: rgba(0,0,0,0.03); }
        .filter-input { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 5px; border-radius: 6px; border: 1px solid #cbd5e1; box-sizing: border-box; background: var(--bg); color: var(--text); }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="welcomeMsg">👤 Loading...</h2>
        <div>
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:22px; cursor:pointer;">🌓 Theme</button>
            <button style="background:#ef4444; color:white; border:none; padding:8px 16px; cursor:pointer; border-radius:6px; margin-left:10px; font-weight:bold;" onclick="localStorage.clear(); location.href='index.html';">Logout</button>
        </div>
    </div>

    <div class="marquee-container"><marquee id="noticeText">Loading Updates...</marquee></div>
    <div style="margin-top:20px;"><button id="backBtn" class="hidden" onclick="goBack()" style="padding:10px 20px; font-weight:bold; border-radius:6px; border:1px solid #cbd5e1; background:var(--box-bg); color:var(--text);">⬅️ Back</button></div>

    <div id="portalHub">
        <div id="mainTitle"><h3 id="panelHeading">Apna Course Select Karein</h3></div>
        <div id="displayGrid" class="grid-container"></div>

        <div class="box"><h3>⭐ My Bookmarked Questions</h3><div id="bookmarkList" style="color:#64748b;">No bookmarks yet.</div></div>
        
        <div class="box">
            <h3>📊 Past Performance Record</h3>
            <input type="text" id="historyFilter" class="filter-input" placeholder="🔍 Subject ya Test ke naam se filter karein..." onkeyup="filterTable('historyTable', this.value)">
            <table><thead><tr><th>Subject & Test Name</th><th>Score</th><th>Date</th><th>Type</th></tr></thead><tbody id="historyTable"></tbody></table>
        </div>

        <div class="box" style="background:rgba(245,158,11,0.02); border:1px solid #fef3c7;">
            <h3>🏆 Public Leaderboard</h3>
            <input type="text" id="leaderboardFilter" class="filter-input" placeholder="🔍 Student Name, Subject ya Test se filter karein..." onkeyup="filterTable('leaderboardTable', this.value)">
            <table><thead><tr><th>Rank</th><th>Student Name</th><th>Subject & Test Name</th><th>Score</th><th>Date</th></tr></thead><tbody id="leaderboardTable"></tbody></table>
        </div>
    </div>

    <div id="testSection" class="box hidden">
        <div id="timerDisplay" class="timer-banner">⏱️ Time Left: --:--</div>
        <h2 id="activeTestTitle" style="text-align:center; margin-top:15px;"></h2>
        <div id="questionArea"></div>
        <button onclick="submitTest()" style="background:#10b981; color:white; padding:15px; border:none; border-radius:8px; font-size:18px; font-weight:bold; width:100%; cursor:pointer; margin-top:20px;">Final Submit Test</button>
    </div>

    <div id="resultSection" class="box hidden">
        <h2 style="color:#10b981; text-align:center; font-size:28px;">🎉 Test Submitted!</h2>
        <h3 id="scoreDisplay" style="text-align:center; padding:15px; background:rgba(16,185,129,0.1); border-radius:8px; margin:20px 0;"></h3>
        <div id="reviewArea"></div>
        <button onclick="location.reload()" style="background:#3b82f6; color:white; border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">Back to Dashboard</button>
    </div>

    <script>
        let allData = [], currentLevel = 'courses', selectedCourse = null, selectedSubject = null, activeQuestions = [], timerInterval = null, totalSecondsLeft = 0, currentTestId = '', currentTestName = '', tabCheatCount = 0, isTestActive = false, answersCache = {};

        const $ = id => document.getElementById(id);

        async function init() {
            const student = JSON.parse(localStorage.getItem('student')); if(!student) return location.href = 'index.html';
            $('welcomeMsg').innerText = `👤 ${student.name}`;
            if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
            try {
                allData = await (await fetch('/api/content')).json(); renderCourses();
                loadStudentHistory(student.mobile); loadLeaderboard(); loadNotice(); loadBookmarks();
            } catch(e) { $('displayGrid').innerHTML = '<div style="color:red; font-weight:bold; padding:20px;">Error loading database!</div>'; }
        }

        function toggleTheme() { document.body.classList.toggle('dark-theme'); localStorage.setItem('theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light'); }
        async function loadNotice() { try{ $('noticeText').innerText = (await (await fetch('/api/notice')).json()).notice || "CGTS Live Engine Open."; }catch(e){} }

        function loadBookmarks() {
            let bks = JSON.parse(localStorage.getItem('stu_bookmarks')) || [];
            if(!bks.length) return $('bookmarkList').innerText = "No saved revision rows found.";
            $('bookmarkList').innerHTML = bks.map((b, i) => `<div class="q-block" style="border-left:4px solid #3b82f6;"><strong>Q: ${b.qText}</strong><br><span style="color:#10b981; font-weight:bold;">Answer: ${b.ans}</span><br><small>Explanation: ${b.vyakhya}</small><br><button onclick="removeBookmark(${i})" style="margin-top:5px; background:#ef4444; color:white; border:none; padding:3px 8px; border-radius:4px; cursor:pointer;">Delete</button></div>`).join('');
        }
        function saveBookmark(qText, ans, vyakhya) {
            let bks = JSON.parse(localStorage.getItem('stu_bookmarks')) || [];
            if(!bks.find(b => b.qText === qText)) { bks.push({qText, ans, vyakhya}); localStorage.setItem('stu_bookmarks', JSON.stringify(bks)); alert("Saved!"); loadBookmarks(); }
        }
        function removeBookmark(index) { let bks = JSON.parse(localStorage.getItem('stu_bookmarks')) || []; bks.splice(index, 1); localStorage.setItem('stu_bookmarks', JSON.stringify(bks)); loadBookmarks(); }

        function trackOfflineCache(qIndex, val) { answersCache[`q_${currentTestId}_${qIndex}`] = val; localStorage.setItem('offline_answers', JSON.stringify(answersCache)); }
        document.addEventListener('visibilitychange', () => { if (isTestActive && document.hidden && ++tabCheatCount >= 2) { alert("🚨 TAB CHANGE DETECTED! SUBMITTING TEST."); submitTest(); } });

        function renderCourses() {
            currentLevel = 'courses'; isTestActive = false; $('backBtn').classList.add('hidden'); $('portalHub').classList.remove('hidden'); $('testSection').classList.add('hidden');
            $('panelHeading').innerText = "🏢 Apna Course Select Karein";
            $('displayGrid').innerHTML = allData.length ? allData.map(c => `<div class="card course-card" onclick="selectCourse(${c.id})">🏢 ${c.name}</div>`).join('') : '<div style="color:#ef4444; font-weight:bold;">No courses available!</div>';
        }
        function selectCourse(cId) {
            selectedCourse = allData.find(c => c.id === cId); currentLevel = 'subjects'; $('backBtn').classList.remove('hidden');
            $('panelHeading').innerText = "📚 Apna Subject Select Karein";
            $('displayGrid').innerHTML = selectedCourse.subjects.map(s => `<div class="card subject-card" onclick="selectSubject(${s.id})">📖 ${s.name}</div>`).join('');
        }
        function selectSubject(sId) {
            selectedSubject = selectedCourse.subjects.find(s => s.id === sId); currentLevel = 'tests';
            $('panelHeading').innerText = "📝 Mock Test Shuru Karein";
            $('displayGrid').innerHTML = selectedSubject.tests.map(t => `<div class="card test-card" onclick="startTest(${t.id}, '${t.name}')">✏️ ${t.name}<div class="test-card-subtext">Time: ${t.questions.length} Mins | 0.25 Neg</div></div>`).join('');
        }

        function startTest(tId, tName) {
            const test = selectedSubject.tests.find(t => t.id === tId); activeQuestions = test.questions; if(!activeQuestions.length) return alert("Test Khali Hai!");
            currentTestId = tId; currentTestName = `${selectedSubject.name} - ${tName}`; // Yahan automatic subject prefix joda gaya hai backend submission ke liye
            tabCheatCount = 0; isTestActive = true;
            answersCache = JSON.parse(localStorage.getItem('offline_answers')) || {};
            $('portalHub').classList.add('hidden'); $('testSection').classList.remove('hidden'); $('activeTestTitle').innerText = currentTestName;
            totalSecondsLeft = activeQuestions.length * 60; startTimer();
            
            $('questionArea').innerHTML = activeQuestions.map((q, idx) => {
                let sv = answersCache[`q_${currentTestId}_${idx}`] || "";
                return `<div class="q-block"><p style="font-size:16px;"><strong>Q${idx+1}: ${q.qText}</strong></p>
                ${['A','B','C','D'].map(opt => `<label><input type="radio" name="q${idx}" value="${opt}" ${sv===opt?'checked':''} onchange="trackOfflineCache(${idx},'${opt}')"> ${opt}) ${q.options[['A','B','C','D'].indexOf(opt)]}</label><br><br>`).join('')}
                <button type="button" style="background:#64748b; color:white; padding:4px 10px; border-radius:4px; border:none; cursor:pointer;" onclick="clearSelection(${idx})">Clear Answer</button></div>`;
            }).join('');
        }

        function clearSelection(idx) { document.querySelectorAll(`input[name="q${idx}"]`).forEach(r => r.checked = false); delete answersCache[`q_${currentTestId}_${idx}`]; localStorage.setItem('offline_answers', JSON.stringify(answersCache)); }
        function startTimer() { clearInterval(timerInterval); timerInterval = setInterval(() => { totalSecondsLeft--; let m = Math.floor(totalSecondsLeft/60), s = totalSecondsLeft%60; $('timerDisplay').innerText = `⏱️ Time Left: ${m}:${s<10?'0'+s:s}`; if(totalSecondsLeft<=0) submitTest(); }, 1000); }

        async function submitTest() {
            clearInterval(timerInterval); isTestActive = false; let correct = 0, wrong = 0;
            $('reviewArea').innerHTML = activeQuestions.map((q, idx) => {
                const chk = document.querySelector(`input[name="q${idx}"]:checked`);
                let ans = chk ? chk.value : 'Nahi Diya';
                let style = ans === 'Nahi Diya' ? "border-left:5px solid #64748b;" : (ans === q.ans ? "border-left:5px solid #10b981;" : "border-left:5px solid #ef4444;");
                ans === q.ans ? correct++ : (ans !== 'Nahi Diya' && wrong++);
                
                return `<div class="q-block" style="${style}"><p><strong>Q${idx+1}: ${q.qText}</strong></p>
                <p style="color:${ans===q.ans?'#10b981':ans==='Nahi Diya'?'#555':'#ef4444'}">Aapka Answer: ${ans}</p><p style="color:#10b981; font-weight:bold;">Correct Option: ${q.ans}</p>
                <div class="vyakhya-box"><b>💡 Vyakhya:</b> ${q.vyakhya}</div>
                <button style="padding:4px 8px; font-size:12px; margin-top:5px; cursor:pointer;" onclick="saveBookmark('${q.qText.replace(/'/g, "\\'")}', '${q.ans}', '${q.vyakhya.replace(/'/g, "\\'")}')">⭐ Save Bookmark</button></div>`;
            }).join('');

            localStorage.setItem('offline_answers', JSON.stringify(answersCache));
            let net = correct - (wrong * 0.25); let fs = net < 0 ? 0 : net;
            $('scoreDisplay').innerHTML = `Sahi: <b>${correct}</b> | Galat: <b>${wrong}</b> <br> Total Score: <mark><b>${fs.toFixed(2)}</b> / ${activeQuestions.length}</mark>`;
            $('testSection').classList.add('hidden'); $('resultSection').classList.remove('hidden');
            
            const stu = JSON.parse(localStorage.getItem('student'));
            await fetch('/api/test/submit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ studentName: stu.name, mobile: stu.mobile, testId: currentTestId, testName: currentTestName, score: fs.toFixed(2), totalQs: activeQuestions.length }) });
        }

        async function loadStudentHistory(mb) { try{ const res = await fetch(`/api/history/${mb}`); const h = await res.json(); $('historyTable').innerHTML = h.reverse().map(r => `<tr><td>${r.testName}</td><td><b>${r.score}</b> / ${r.totalQs}</td><td>${r.date}</td><td>${r.isFirstAttempt ? '<span style="color:#10b981; font-weight:bold;">First Attempt</span>':'<span>Practice Run</span>'}</td></tr>`).join(''); }catch(e){} }
        async function loadLeaderboard() { try{ const list = await (await fetch('/api/leaderboard')).json(); $('leaderboardTable').innerHTML = list.map((l, i) => `<tr><td><b>#${i+1}</b></td><td>${l.studentName}</td><td>${l.testName}</td><td><mark><b>${l.score}</b></mark></td><td>${l.date}</td></tr>`).join(''); }catch(e){} }
        
        // --- LIVE TABLE FILTER ENGINE ---
        function filterTable(tableId, filterValue) {
            const val = filterValue.toLowerCase();
            const rows = document.querySelectorAll(`#${tableId} tr`);
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(val) ? "" : "none";
            });
        }

        function goBack() { currentLevel === 'subjects' ? renderCourses() : (currentLevel === 'tests' && selectCourse(selectedCourse.id)); }
        window.onload = init;
    </script>
</body>
</html>
